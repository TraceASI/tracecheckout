<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Checkout</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
}

body{
min-height:100vh;
background: linear-gradient(135deg,#0f172a,#1e293b,#020617);
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* container */

.wrapper{
width:100%;
max-width:900px;
padding:40px 20px;
}

/* header */

.header{
text-align:center;
margin-bottom:40px;
}

.header h1{
font-size:40px;
font-weight:700;
margin-bottom:10px;
}

.header p{
color:#94a3b8;
font-size:16px;
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* card */

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:14px;
padding:25px;
text-align:center;
transition:all .25s ease;
backdrop-filter: blur(8px);
}

.card:hover{
transform:translateY(-6px);
background:rgba(255,255,255,0.08);
border-color:#3b82f6;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* price */

.price{
font-size:30px;
font-weight:700;
margin-bottom:15px;
}

/* button */

.button{
display:inline-block;
padding:12px 20px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
border-radius:8px;
text-decoration:none;
color:white;
font-weight:600;
font-size:15px;
transition:all .2s ease;
}

.button:hover{
transform:scale(1.05);
box-shadow:0 6px 20px rgba(37,99,235,0.6);
}

/* footer */

.footer{
text-align:center;
margin-top:40px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<h1>Trace Checkout</h1>
<p>Select a payment option below</p>
</div>

<div class="grid">

<div class="card">
<div class="price">$5,995</div>
<a class="button" href="shashaz.html" target="_blank">Open Payment</a>
</div>

<div class="card">
<div class="price">$4,995</div>
<a class="button" href="panjaz.html" target="_blank">Open Payment</a>
</div>

<div class="card">
<div class="price">$3,995</div>
<a class="button" href="choraz.html" target="_blank">Open Payment</a>
</div>

<div class="card">
<div class="price">$2,995</div>
<a class="button" href="sehaz.html" target="_blank">Open Payment</a>
</div>

<div class="card">
<div class="price">$1,995</div>
<a class="button" href="tuhaz.html" target="_blank">Open Payment</a>
</div>

<div class="card">
<div class="price">$995</div>
<a class="button" href="yakaz.html" target="_blank">Open Payment</a>
</div>

<div class="card">
<div class="price">$400</div>
<a class="button" href="chorsad.html" target="_blank">Open Payment</a>
</div>

<div class="card">
<div class="price">$200</div>
<a class="button" href="tuhsad.html" target="_blank">Open Payment</a>
</div>

<div class="card">
<div class="price">$1</div>
<a class="button" href="yak.html" target="_blank">Open Payment</a>
</div>

</div>

<div class="footer">
Trace Checkout © 2026
</div>

</div>

</body>
</html>
